name: Deploy Sub-Store to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sub-store-workers
        uses: actions/checkout@v4
        with:
          path: sub-store-workers

      - name: Checkout Sub-Store source
        uses: actions/checkout@v4
        with:
          repository: sub-store-org/Sub-Store
          path: Sub-Store

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: sub-store-workers
        run: npm install

      - name: Deploy to Workers
        working-directory: sub-store-workers
        run: npm run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Workers password secret
        working-directory: sub-store-workers
        run: echo "${{ secrets.SUB_STORE_PASSWORD }}" | npx wrangler secret put SUB_STORE_FRONTEND_BACKEND_PATH
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Pages
        working-directory: sub-store-workers
        run: npm run deploy:pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set Pages password secret
        working-directory: sub-store-workers
        run: echo "${{ secrets.SUB_STORE_PASSWORD }}" | npx wrangler pages secret put SUB_STORE_FRONTEND_BACKEND_PATH --project-name sub-store
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
